name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - run: >
          dotnet publish AlwaysOnTopWidget/AlwaysOnTopWidget.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish
      # usage-widget.ps1 and widget.html are separate Content files the exe
      # launches at its own AppContext.BaseDirectory - `dotnet publish` copies
      # them into publish/ alongside the exe, but a release asset list of just
      # the .exe silently drops them, leaving the exe unable to find its
      # server script on a fresh machine. Ship all three together.
      - run: Compress-Archive -Path publish/AlwaysOnTopWidget.exe, publish/usage-widget.ps1, publish/widget.html -DestinationPath claude-usage-widget-win-x64.zip
      # dotnet build/publish succeeding doesn't prove the shipped zip actually
      # works - that gap already let a release-breaking packaging bug through
      # twice. Extracts the real zip into an empty folder and confirms the
      # exe launches, its server binds, and it serves data before the
      # release goes out.
      - run: pwsh -File scripts/smoke-test.ps1 -ZipPath claude-usage-widget-win-x64.zip
      - uses: softprops/action-gh-release@v3
        with:
          files: claude-usage-widget-win-x64.zip
